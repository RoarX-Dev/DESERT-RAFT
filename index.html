<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; font-family: sans-serif; }
  #results-container { display: none; }
</style>
</head>
<body>

<div id="results-container"></div>

<script>
const params = new URLSearchParams(location.search);
const query  = params.get('q') || '';

// --- CONFIGURATION ---
const TARGET_WEB_RESULTS  = 25;  // Max web results to compile
const TARGET_IMG_RESULTS  = 30;  // Max image results to compile
const MAX_WEB_PAGES       = 5;   // Max web pagination clicks
const MAX_IMG_PAGES       = 5;   // Max image pagination clicks
const PAGE_WAIT_MS        = 900; // Wait after each page click
const TAB_SWITCH_WAIT_MS  = 1400;// Wait after switching to image tab (needs longer to render)

window.__gcse = {
  parsetags: 'explicit',
  initializationCallback: function() {
    if (!query) return;

    google.search.cse.element.render({
      div: 'results-container',
      tag: 'searchresults-only',
      attributes: {
        queryParameterName: 'q',
        autoSearchOnLoad: true,
        webSearchResultSetSize: 'filtered_cse'
      }
    });

    setTimeout(() => {
      try {
        const el = google.search.cse.element.getElement('results-container');
        if (el) el.execute(query);
      } catch(e) {}
    }, 400);
  }
};

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Harvest web results from current page ──────────────────────
function harvestWebPage() {
  const items = [];
  document.querySelectorAll('.gsc-result').forEach(r => {
    const titleA = r.querySelector('.gs-title a');
    if (!titleA) return;
    const href    = titleA.getAttribute('data-ctorig') || titleA.href || '';
    const title   = titleA.textContent.trim();
    const snippet = r.querySelector('.gs-snippet')?.textContent?.trim() || '';
    if (href && title && href.startsWith('http')) {
      items.push({ href, title, snippet });
    }
  });
  return items;
}

// ── Harvest images from current image tab page ─────────────────
function harvestImagePage() {
  const images = [];
  document.querySelectorAll('img.gs-image.gs-image-scalable').forEach(img => {
    // src may be lazy — check data-src first, then src
    const src = img.getAttribute('data-src') || img.src || '';
    // title attribute is the primary label in GSC image results
    const caption = img.title || img.alt || '';
    if (src && src.startsWith('http')) {
      images.push({ url: src, caption: caption.trim() });
    }
  });
  return images;
}

// ── Generic paginator — clicks page N in .gsc-cursor ──────────
function clickPageNumber(pageIndex) {
  const container = document.querySelector('.gsc-cursor');
  if (!container) return false;
  const pages = Array.from(container.querySelectorAll('.gsc-cursor-page'));
  const btn = pages.find(p => p.textContent.trim() == pageIndex);
  if (btn) { btn.click(); return true; }
  return false;
}

// ── Find and click the image tab ──────────────────────────────
function clickImageTab() {
  // Image tab is the INACTIVE tab — active one is the web tab we're already on
  const tabs = Array.from(document.querySelectorAll('.gsc-tabHeader'));
  const imageTab = tabs.find(t =>
    t.classList.contains('gsc-tabhInactive') &&
    (t.textContent.toLowerCase().includes('image') || t.getAttribute('data-tab')?.toLowerCase().includes('image'))
  );
  if (imageTab) { imageTab.click(); return true; }

  // Fallback: just click whatever inactive tab exists
  const anyInactive = tabs.find(t => t.classList.contains('gsc-tabhInactive'));
  if (anyInactive) { anyInactive.click(); return true; }

  return false;
}

// ── PHASE 1: Web results with pagination ──────────────────────
async function runWebPhase() {
  const compiledItems = [];
  let pageIndex = 1;

  while (pageIndex <= MAX_WEB_PAGES) {
    await sleep(PAGE_WAIT_MS);

    const items = harvestWebPage();
    items.forEach(item => {
      if (!compiledItems.find(i => i.href === item.href)) compiledItems.push(item);
    });

    if (compiledItems.length >= TARGET_WEB_RESULTS || items.length === 0) break;

    pageIndex++;
    const clicked = clickPageNumber(pageIndex);
    if (!clicked) break;
  }

  return compiledItems;
}

// ── PHASE 2: Image tab + image pagination ─────────────────────
async function runImagePhase() {
  const compiledImages = [];

  // Switch to image tab
  const switched = clickImageTab();
  if (!switched) return compiledImages; // No image tab found, give up gracefully

  // Wait longer — image tab needs time to render its own results
  await sleep(TAB_SWITCH_WAIT_MS);

  let pageIndex = 1;

  while (pageIndex <= MAX_IMG_PAGES) {
    const images = harvestImagePage();
    images.forEach(img => {
      if (!compiledImages.find(i => i.url === img.url)) compiledImages.push(img);
    });

    if (compiledImages.length >= TARGET_IMG_RESULTS || images.length === 0) break;

    pageIndex++;
    const clicked = clickPageNumber(pageIndex);
    if (!clicked) break;

    // Wait for next image page to render
    await sleep(PAGE_WAIT_MS);
  }

  return compiledImages;
}

// ── MAIN ORCHESTRATOR ─────────────────────────────────────────
async function run() {
  // Phase 1: scrape web results across pages
  const items  = await runWebPhase();

  // Phase 2: switch to image tab and scrape image results across pages
  const images = await runImagePhase();

  // Send everything to parent (Ruminance)
  window.parent.postMessage({
    type:   'cse-results',
    query:  query,
    items:  items.slice(0, TARGET_WEB_RESULTS),
    images: images.slice(0, TARGET_IMG_RESULTS)
  }, '*');
}

if (query) {
  // Give the initial CSE widget a head start before we start crawling
  setTimeout(run, 1500);
}
</script>

<script async src="https://cse.google.com/cse.js?cx=6580aa8b33a2748cb"></script>

</body>
</html>
