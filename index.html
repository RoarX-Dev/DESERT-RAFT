<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; font-family: sans-serif; }
  #hidden-containers { display: none; }
</style>
</head>
<body>

<div id="hidden-containers">
  <div id="web-target"></div>
  <div id="image-target"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const query  = params.get('q') || '';

let compiledWebItems = [];
let compiledImageItems = [];
let webDone = false;
let imageDone = false;

window.__gcse = {
  parsetags: 'explicit',
  initializationCallback: function() {
    if (!query) return;

    // 1. Web Search Node Configuration
    google.search.cse.element.render({
      div: 'web-target',
      tag: 'searchresults-only',
      attributes: {
        queryParameterName: 'q',
        autoSearchOnLoad: true,
        // "filtered_cse" tells Google to maximize results up to the UI ceiling limit per request
        webSearchResultSetSize: 'filtered_cse' 
      }
    });

    // 2. Image Search Node Configuration
    google.search.cse.element.render({
      div: 'image-target',
      tag: 'searchresults-only',
      attributes: {
        queryParameterName: 'q',
        autoSearchOnLoad: true,
        defaultToImageSearch: true,
        imageSearchResultSetSize: 'filtered_cse'
      }
    });

    setTimeout(() => {
      try {
        const webEl = google.search.cse.element.getElement('web-target');
        if (webEl) webEl.execute(query);
        
        const imgEl = google.search.cse.element.getElement('image-target');
        if (imgEl) imgEl.execute(query);
      } catch(e) {
        console.error("Error executing parallel search:", e);
      }
    }, 400);
  }
};

function harvestWeb() {
  const container = document.getElementById('web-target');
  const items = [];
  
  container.querySelectorAll('.gsc-result').forEach(r => {
    let href = '';
    let title = '';
    const titleA = r.querySelector('.gs-title a');
    if (titleA) {
      href  = titleA.getAttribute('data-ctorig') || titleA.href || '';
      title = titleA.textContent.trim();
    }
    const snippet = r.querySelector('.gs-snippet')?.textContent?.trim() || '';
    if (href && title && href.startsWith('http')) {
      items.push({ href, title, snippet });
    }
  });
  return items;
}

function harvestImages() {
  const container = document.getElementById('image-target');
  const images = [];

  container.querySelectorAll('.gs-image, .gsc-thumbnail img, .gs-image-box img, .gsc-webResult img').forEach(img => {
    const src = img.getAttribute('data-src') || img.src || '';
    const alt = img.alt || img.title || '';
    if (src && src.startsWith('http') && !images.some(i => i.url === src)) {
      images.push({ url: src, caption: alt });
    }
  });
  return images;
}

let attempts = 0;
const MAX_ATTEMPTS = 45; 

function pollParallel() {
  attempts++;

  if (!webDone) {
    const webResults = harvestWeb();
    if (webResults.length > 0) {
      compiledWebItems = webResults;
      webDone = true;
    }
  }

  if (!imageDone) {
    const imageResults = harvestImages();
    if (imageResults.length > 0) {
      compiledImageItems = imageResults;
      imageDone = true;
    }
  }

  // Fallback condition: If we've given it some time (15 attempts) and at least one channel found content, accept it
  if ((webDone && imageDone) || (attempts >= 15 && (webDone || imageDone)) || attempts >= MAX_ATTEMPTS) {
    
    window.parent.postMessage({
      type:   'cse-results',
      query:  query,
      items:  compiledWebItems, 
      images: compiledImageItems // All limitations entirely removed
    }, '*');
    
    return;
  }

  setTimeout(pollParallel, 400);
}

if (query) {
  setTimeout(pollParallel, 1000);
}
</script>

<script async src="https://cse.google.com/cse.js?cx=6580aa8b33a2748cb"></script>

</body>
</html>
