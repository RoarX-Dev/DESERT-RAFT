<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; }
</style>
</head>
<body>

<div id="results"></div>

<script>
const params = new URLSearchParams(location.search);
const query  = params.get('q') || '';

// Inject query into URL hash so CSE auto-searches
if (query) {
  // Google Hosted Search reads gsc.q from the hash
  history.replaceState(null, '', location.pathname + location.search + '#gsc.tab=0&gsc.q=' + encodeURIComponent(query));
}

window.__gcse = {
  parsetags: 'explicit',
  initializationCallback: function() {
    google.search.cse.element.render({
      div: 'results',
      tag: 'searchresults-only',
      attributes: {
        queryParameterName: 'q',
        autoSearchOnLoad: true,
      }
    });

    // After render, execute the search
    setTimeout(() => {
      try {
        const el = google.search.cse.element.getElement('results');
        if (el) el.execute(query);
      } catch(e) {}
    }, 800);
  }
};

// ── Poll for results ──────────────────────────────────────────────
let attempts = 0;
const MAX = 40; // 40 × 400ms = 16 seconds max

function harvest() {
  const items = [];
  const images = [];

  document.querySelectorAll('.gsc-result').forEach(r => {
    // Title + href
    let href = '';
    let title = '';
    const titleA = r.querySelector('.gs-title a');
    if (titleA) {
      href  = titleA.getAttribute('data-ctorig') || titleA.href || '';
      title = titleA.textContent.trim();
    }
    const snippet = r.querySelector('.gs-snippet')?.textContent?.trim() || '';
    if (href && title && href.startsWith('http')) {
      items.push({ href, title, snippet });
    }
  });

  // Thumbnail images from result cards
  document.querySelectorAll('.gs-image, .gsc-thumbnail img, .gs-image-box img').forEach(img => {
    const src = img.getAttribute('data-src') || img.src || '';
    const alt = img.alt || '';
    if (src && src.startsWith('http')) images.push({ url: src, caption: alt });
  });

  return { items, images };
}

function poll() {
  attempts++;
  const { items, images } = harvest();

  if (items.length > 0) {
    window.parent.postMessage({
      type:   'cse-results',
      query:  query,
      items:  items,
      images: images.slice(0, 6)
    }, '*');
    return; // done
  }

  if (attempts >= MAX) {
    // Send empty so Ruminance doesn't hang forever
    window.parent.postMessage({
      type:   'cse-results',
      query:  query,
      items:  [],
      images: images.slice(0, 6)
    }, '*');
    return;
  }

  setTimeout(poll, 400);
}

// Start polling after a short head-start for CSE JS to boot
setTimeout(poll, 1200);
</script>

<script async src="https://cse.google.com/cse.js?cx=6580aa8b33a2748cb"></script>

</body>
</html>
