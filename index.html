<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; font-family: sans-serif; }
  /* Hide the widget so the user doesn't see the pages flashing/changing */
  #results-container { display: none; }
</style>
</head>
<body>

<div id="results-container"></div>

<script>
const params = new URLSearchParams(location.search);
const query  = params.get('q') || '';

// --- CONFIGURATION ---
const TARGET_RESULTS = 25; // How many results you want to compile
const MAX_PAGES_TO_CLICK = 5; // Failsafe: Don't click more than 5 times
const WAIT_TIME_MS = 800; // How long to wait for Google to load the next page

window.__gcse = {
  parsetags: 'explicit',
  initializationCallback: function() {
    if (!query) return;

    google.search.cse.element.render({
      div: 'results-container',
      tag: 'searchresults-only',
      attributes: {
        queryParameterName: 'q',
        autoSearchOnLoad: true,
        webSearchResultSetSize: 'filtered_cse' // Maximize results per page
      }
    });

    setTimeout(() => {
      try {
        const el = google.search.cse.element.getElement('results-container');
        if (el) el.execute(query);
      } catch(e) {}
    }, 400);
  }
};

// ── DOM Harvester ──────────────────────────────────────────────
function harvestCurrentPage() {
  const items = [];
  const images = [];

  document.querySelectorAll('.gsc-result').forEach(r => {
    let href = '';
    let title = '';
    const titleA = r.querySelector('.gs-title a');
    if (titleA) {
      href  = titleA.getAttribute('data-ctorig') || titleA.href || '';
      title = titleA.textContent.trim();
    }
    const snippet = r.querySelector('.gs-snippet')?.textContent?.trim() || '';
    if (href && title && href.startsWith('http')) {
      // Prevent duplicates by checking if we already grabbed it on a previous page
      items.push({ href, title, snippet });
    }
  });

  document.querySelectorAll('.gs-image, .gsc-thumbnail img, .gs-image-box img').forEach(img => {
    const src = img.getAttribute('data-src') || img.src || '';
    const alt = img.alt || img.title || '';
    if (src && src.startsWith('http')) images.push({ url: src, caption: alt });
  });

  return { items, images };
}

// ── Async Auto-Paginator ───────────────────────────────────────
async function runAutoPaginator() {
  let compiledItems = [];
  let compiledImages = [];
  let currentPageIndex = 1;

  // Helper to wait for network/DOM
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  // Loop through pages
  while (currentPageIndex <= MAX_PAGES_TO_CLICK) {
    // Wait for the current page to finish rendering
    await sleep(WAIT_TIME_MS); 

    const { items, images } = harvestCurrentPage();
    
    // Add new unique items to our master lists
    items.forEach(item => {
      if (!compiledItems.find(i => i.href === item.href)) compiledItems.push(item);
    });
    images.forEach(img => {
      if (!compiledImages.find(i => i.url === img.url)) compiledImages.push(img);
    });

    // Check if we hit our target
    if (compiledItems.length >= TARGET_RESULTS || items.length === 0) {
      break; 
    }

    // Find the next page button in Google's pagination UI
    currentPageIndex++;
    let nextButtonContainer = document.querySelector('.gsc-cursor');
    
    if (nextButtonContainer) {
      // Find the specific page number block (e.g., "2", "3")
      let pages = Array.from(nextButtonContainer.querySelectorAll('.gsc-cursor-page'));
      let nextBtn = pages.find(p => p.textContent.trim() == currentPageIndex);

      if (nextBtn) {
        nextBtn.click(); // Programmatically click "Next Page"
      } else {
        break; // No more pages exist for this query
      }
    } else {
      break; // Pagination UI didn't load
    }
  }

  // --- DONE! Send payload to parent ---
  window.parent.postMessage({
    type:   'cse-results',
    query:  query,
    items:  compiledItems,
    images: compiledImages
  }, '*');
}

// Start the crawler sequence
if (query) {
  setTimeout(runAutoPaginator, 1500); // Give initial page a head start to load
}
</script>

<script async src="https://cse.google.com/cse.js?cx=6580aa8b33a2748cb"></script>

</body>
</html>
